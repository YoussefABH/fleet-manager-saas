<!-- MODAL CONTRAT (identique à avant) -->
<div id="contratModal" style="display: none; position: fixed; inset:0; background: rgba(0,0,0,0.5); align-items: center; justify-content: center; z-index: 1000; overflow-y: auto; padding: 20px;">
    <div style="background: white; max-width: 700px; width: 100%; border-radius: 20px; padding: 1.5rem; margin: auto;">
        <h3 class="mb-3">Nouveau contrat</h3>
        <div class="form-group"><label>Véhicule</label><select id="contratVehiculeId" class="form-control"></select></div>
        <div class="form-group"><label>Type client</label><select id="clientType" class="form-control"><option value="particulier">Particulier</option><option value="societe">Société</option></select></div>
        <div id="particulierFields">
            <div class="form-group"><label>CIN</label><input id="conducteurCin" class="form-control"></div>
            <div class="form-group"><label>Nom complet</label><input id="conducteurNom" class="form-control"></div>
            <div class="form-group"><label>Téléphone</label><input id="conducteurTel" class="form-control"></div>
            <div class="form-group"><label>Email</label><input id="conducteurEmail" class="form-control"></div>
            <div class="form-group"><label>Adresse</label><input id="conducteurAdresse" class="form-control"></div>
            <div class="form-group"><label>Permis n°</label><input id="conducteurPermis" class="form-control"></div>
        </div>
        <div id="societeFields" style="display:none;">
            <div class="form-group"><label>Raison sociale</label><input id="societeRaison" class="form-control"></div>
            <div class="form-group"><label>ICE</label><input id="societeICE" class="form-control"></div>
            <div class="form-group"><label>IF</label><input id="societeIF" class="form-control"></div>
            <div class="form-group"><label>RC</label><input id="societeRC" class="form-control"></div>
            <div class="form-group"><label>Adresse</label><input id="societeAdresse" class="form-control"></div>
            <div class="form-group"><label>Email</label><input id="societeEmail" class="form-control"></div>
            <div class="form-group"><label>Téléphone</label><input id="societeTel" class="form-control"></div>
            <div class="form-group"><label>Contact</label><input id="societeContact" class="form-control"></div>
        </div>
        <div class="form-group"><label>Date début</label><input id="contratDebut" type="date" class="form-control"></div>
        <div class="form-group"><label>Date fin</label><input id="contratFin" type="date" class="form-control"></div>
        <div class="form-group"><label>Montant total (DH)</label><input id="contratMontant" type="number" class="form-control"></div>
        <div class="form-group"><label>Avance (DH)</label><input id="contratAvance" type="number" class="form-control" value="0"></div>
        <div class="form-group"><label>Lieu départ</label><input id="lieuDepart" class="form-control" value="Rabat"></div>
        <div class="form-group"><label>Lieu retour</label><input id="lieuRetour" class="form-control"></div>
        <div class="form-group"><label>Km départ</label><input id="kmDepart" type="number" class="form-control"></div>
        <div class="form-group"><label>Km retour</label><input id="kmRetour" type="number" class="form-control"></div>
        <div class="form-group"><label>Carburant départ</label><select id="niveauCarburant" class="form-control"><option>Plein</option><option>Réservé</option><option>Moitié</option></select></div>
        <div class="form-group"><label>État livraison</label><input id="etatLivraison" class="form-control" value="Très bon état"></div>
        <div class="form-group"><label>État retour</label><input id="etatRetour" class="form-control"></div>
        <div style="display: flex; gap: 1rem; justify-content: flex-end;">
            <button id="closeContratModal" class="btn btn-secondary">Annuler</button>
            <button id="saveContrat" class="btn btn-primary">Enregistrer contrat</button>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import { getFirestore, collection, addDoc, getDocs, doc, updateDoc, deleteDoc, query, where, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDE3BJsD1mp-vz9TEJSo4WtFcHe8sw6jJI",
        authDomain: "gslv-c3875.firebaseapp.com",
        projectId: "gslv-c3875",
        storageBucket: "gslv-c3875.firebasestorage.app",
        messagingSenderId: "971384785471",
        appId: "1:971384785471:web:c881bc4db0595720ae068a"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    let currentUser = null;
    let vehiculesList = [];

    // MODAL LOGIC (identique)
    const modal = document.getElementById('contratModal');
    const openBtn = document.getElementById('openContratModalBtn');
    const closeBtn = document.getElementById('closeContratModal');
    const saveBtn = document.getElementById('saveContrat');
    const clientTypeSelect = document.getElementById('clientType');
    const particulierDiv = document.getElementById('particulierFields');
    const societeDiv = document.getElementById('societeFields');

    clientTypeSelect.addEventListener('change', () => {
        if (clientTypeSelect.value === 'societe') {
            particulierDiv.style.display = 'none';
            societeDiv.style.display = 'block';
        } else {
            particulierDiv.style.display = 'block';
            societeDiv.style.display = 'none';
        }
    });

    openBtn.onclick = () => {
        if (vehiculesList.length === 0) { alert("Ajoutez d'abord un véhicule."); return; }
        document.getElementById('contratVehiculeId').value = '';
        document.getElementById('conducteurCin').value = '';
        document.getElementById('conducteurNom').value = '';
        document.getElementById('conducteurTel').value = '';
        document.getElementById('conducteurEmail').value = '';
        document.getElementById('conducteurAdresse').value = '';
        document.getElementById('conducteurPermis').value = '';
        document.getElementById('societeRaison').value = '';
        document.getElementById('societeICE').value = '';
        document.getElementById('societeIF').value = '';
        document.getElementById('societeRC').value = '';
        document.getElementById('societeAdresse').value = '';
        document.getElementById('societeEmail').value = '';
        document.getElementById('societeTel').value = '';
        document.getElementById('societeContact').value = '';
        document.getElementById('contratDebut').value = '';
        document.getElementById('contratFin').value = '';
        document.getElementById('contratMontant').value = '';
        document.getElementById('contratAvance').value = '0';
        document.getElementById('lieuDepart').value = 'Rabat';
        document.getElementById('lieuRetour').value = '';
        document.getElementById('kmDepart').value = '';
        document.getElementById('kmRetour').value = '';
        document.getElementById('niveauCarburant').value = 'Plein';
        document.getElementById('etatLivraison').value = 'Très bon état';
        document.getElementById('etatRetour').value = '';
        clientTypeSelect.dispatchEvent(new Event('change'));
        modal.style.display = 'flex';
    };
    closeBtn.onclick = () => modal.style.display = 'none';
    window.onclick = (e) => { if (e.target === modal) modal.style.display = 'none'; };

    saveBtn.onclick = async () => {
        const vehiculeId = document.getElementById('contratVehiculeId').value;
        if (!vehiculeId) { alert("Sélectionnez un véhicule"); return; }
        const debut = document.getElementById('contratDebut').value;
        const fin = document.getElementById('contratFin').value;
        const montant = Number(document.getElementById('contratMontant').value);
        if (!debut || !fin || !montant) { alert("Dates et montant obligatoires"); return; }

        let clientInfo = {};
        if (clientTypeSelect.value === 'particulier') {
            const cin = document.getElementById('conducteurCin').value.trim();
            const nom = document.getElementById('conducteurNom').value.trim();
            if (!cin || !nom) { alert("CIN et nom requis"); return; }
            clientInfo = { type: 'particulier', cin, nom, telephone: document.getElementById('conducteurTel').value, email: document.getElementById('conducteurEmail').value, adresse: document.getElementById('conducteurAdresse').value, permis: document.getElementById('conducteurPermis').value };
        } else {
            const raison = document.getElementById('societeRaison').value.trim();
            const ice = document.getElementById('societeICE').value.trim();
            const ifs = document.getElementById('societeIF').value.trim();
            const rc = document.getElementById('societeRC').value.trim();
            const adresse = document.getElementById('societeAdresse').value.trim();
            const email = document.getElementById('societeEmail').value.trim();
            const tel = document.getElementById('societeTel').value.trim();
            if (!raison || !ice || !ifs || !rc || !adresse || !email || !tel) { alert("Tous les champs société requis"); return; }
            clientInfo = { type: 'societe', raisonSociale: raison, ice, if: ifs, rc, adresse, email, telephone: tel, contact: document.getElementById('societeContact').value };
        }

        const contratData = {
            vehiculeId, clientInfo, debut: new Date(debut), fin: new Date(fin), montant,
            avance: Number(document.getElementById('contratAvance').value) || 0,
            lieuDepart: document.getElementById('lieuDepart').value,
            lieuRetour: document.getElementById('lieuRetour').value,
            kmDepart: Number(document.getElementById('kmDepart').value) || null,
            kmRetour: Number(document.getElementById('kmRetour').value) || null,
            niveauCarburant: document.getElementById('niveauCarburant').value,
            etatLivraison: document.getElementById('etatLivraison').value,
            etatRetour: document.getElementById('etatRetour').value,
            userId: currentUser.uid, createdAt: new Date(), updatedAt: new Date(), statut: "actif"
        };
        try {
            await addDoc(collection(db, "contrats"), contratData);
            alert("Contrat enregistré");
            modal.style.display = 'none';
            loadContrats();
        } catch (error) { alert("Erreur: "+error.message); }
    };

    async function loadVehicules() {
        const q = query(collection(db, "vehicules"), where("userId", "==", currentUser.uid));
        const snap = await getDocs(q);
        vehiculesList = snap.docs.map(d => ({ id: d.id, ...d.data() }));
        const select = document.getElementById('contratVehiculeId');
        select.innerHTML = '<option value="">Sélectionner</option>';
        vehiculesList.forEach(v => select.innerHTML += `<option value="${v.id}">${v.marque} ${v.modele} - ${v.immatriculation}</option>`);
    }

    async function loadContrats() {
        const q = query(collection(db, "contrats"), where("userId", "==", currentUser.uid));
        const snapshot = await getDocs(q);
        const container = document.getElementById('contratsList');
        container.innerHTML = '';
        if (snapshot.empty) { container.innerHTML = '<div class="card">Aucun contrat.</div>'; return; }
        for (const docSnap of snapshot.docs) {
            const c = docSnap.data();
            const vehDoc = await getDoc(doc(db, "vehicules", c.vehiculeId));
            const vehiculeNom = vehDoc.exists() ? `${vehDoc.data().marque} ${vehDoc.data().modele}` : "?";
            let clientDisplay = '';
            if (c.clientInfo.type === 'particulier') clientDisplay = `${c.clientInfo.nom} (${c.clientInfo.cin})`;
            else clientDisplay = `${c.clientInfo.raisonSociale} (ICE: ${c.clientInfo.ice})`;
            const debutDate = c.debut?.toDate ? c.debut.toDate() : new Date(c.debut);
            const finDate = c.fin?.toDate ? c.fin.toDate() : new Date(c.fin);
            container.innerHTML += `
                <div class="card" data-id="${docSnap.id}">
                    <div><strong>${vehiculeNom}</strong> - ${debutDate.toLocaleDateString()} → ${finDate.toLocaleDateString()}</div>
                    <div>Client : ${clientDisplay}</div>
                    <div>Montant : ${c.montant} DH | Avance : ${c.avance || 0} DH</div>
                    <div class="card-actions">
                        <button class="btn btn-primary btn-sm downloadPdf" data-id="${docSnap.id}"><i class="fas fa-file-pdf"></i> Télécharger PDF</button>
                        <button class="btn btn-danger btn-sm deleteContrat" data-id="${docSnap.id}"><i class="fas fa-trash"></i> Supprimer</button>
                    </div>
                </div>
            `;
        }
        document.querySelectorAll('.deleteContrat').forEach(btn => btn.onclick = async () => { if(confirm("Supprimer ?")) { await deleteDoc(doc(db, "contrats", btn.dataset.id)); loadContrats(); } });
        document.querySelectorAll('.downloadPdf').forEach(btn => btn.onclick = () => genererPDFContrat(btn.dataset.id));
    }

    // ==================== GÉNÉRATION PDF AVEC LA LOGIQUE DU CONTRAT FOURNI ====================
    async function genererPDFContrat(contratId) {
        const contratDoc = await getDoc(doc(db, "contrats", contratId));
        if (!contratDoc.exists()) { alert("Contrat introuvable"); return; }
        const contrat = contratDoc.data();
        const vehiculeDoc = await getDoc(doc(db, "vehicules", contrat.vehiculeId));
        const vehicule = vehiculeDoc.exists() ? vehiculeDoc.data() : { marque: "", modele: "", immatriculation: "" };

        // Extraction des données
        const client = contrat.clientInfo;
        const debut = contrat.debut.toDate();
        const fin = contrat.fin.toDate();
        const nbJours = Math.ceil((fin - debut) / (1000 * 60 * 60 * 24));
        const prixJournalier = (contrat.montant / nbJours).toFixed(2);
        const tva = contrat.montant * 0.2;
        const totalTTC = contrat.montant + tva;
        const caution = contrat.avance || 0;  // L'avance est considérée comme caution dans le contrat type
        const kmDepart = contrat.kmDepart || "_____";
        
        let nom = "", cin = "", permis = "", telephone = "", adresse = "";
        let deuxiemeNom = "", deuxiemeCin = "", deuxiemeAdresse = "", deuxiemePermis = "", deuxiemeMobile = "";
        let modeReglement = "especes"; // Par défaut

        if (client.type === 'particulier') {
            nom = client.nom;
            cin = client.cin;
            permis = client.permis || "_______________";
            telephone = client.telephone || "";
            adresse = client.adresse || "";
        } else {
            nom = client.raisonSociale;
            cin = client.ice || "_______________";
            permis = "_______________";
            telephone = client.telephone;
            adresse = client.adresse;
        }

        // Fonction de génération HTML du contrat (inspirée de votre code)
        function genererContratRectoVerso(
            locataire, cin, permis, mobile, adresse, vehicule, matricule, debut, fin, caution, km,
            deuxiemeCondNom, deuxiemeCondCin, deuxiemeCondAdresse, deuxiemeCondPermis, deuxiemeCondMobile,
            agenceDepart, agenceRetour, heureDepart, heureRetour, lieuDepart, lieuRetour,
            changementVehiculeModele, changementVehiculeMatricule, changementVehiculeKm,
            prolongationDebut, prolongationFin, lieuProlongationDepart, lieuProlongationRetour, fraisLivraison,
            modeReglement, observations
        ) {
            const today = new Date().toLocaleDateString('fr-FR');
            const safeLoc = locataire.trim() || "___________________";
            const safeCin = cin.trim() || "_______________";
            const safePermis = permis.trim() || "_______________";
            const safeMobile = mobile.trim() || "_______________";
            const safeAdresse = adresse.trim() || "_______________";
            const safeVehicule = vehicule.trim() || "_______________";
            const safeMatricule = matricule.trim() || "_______________";
            const safeDebut = debut.trim() || "[Date]";
            const safeFin = fin.trim() || "[Date]";
            const safeCaution = caution.toString().trim() || "0";
            const safeKm = km.toString().trim() || "_____";

            const safeDeuxNom = deuxiemeCondNom?.trim() || "_______________";
            const safeDeuxCin = deuxiemeCondCin?.trim() || "_______________";
            const safeDeuxAdresse = deuxiemeCondAdresse?.trim() || "_______________";
            const safeDeuxPermis = deuxiemeCondPermis?.trim() || "_______________";
            const safeDeuxMobile = deuxiemeCondMobile?.trim() || "_______________";

            const safeAgenceDepart = agenceDepart?.trim() || "Rabat - Agence Principale";
            const safeAgenceRetour = agenceRetour?.trim() || "Rabat - Agence Principale";
            const safeHeureDepart = heureDepart?.trim() || "10:00";
            const safeHeureRetour = heureRetour?.trim() || "10:00";
            const safeLieuDepart = lieuDepart?.trim() || "Rabat";
            const safeLieuRetour = lieuRetour?.trim() || "Rabat";

            const safeChangementModele = changementVehiculeModele?.trim() || "_______________";
            const safeChangementMatricule = changementVehiculeMatricule?.trim() || "_______________";
            const safeChangementKm = changementVehiculeKm?.trim() || "_______________";

            const safeProDebut = prolongationDebut?.trim() || "___________";
            const safeProFin = prolongationFin?.trim() || "___________";
            const safeLieuProDepart = lieuProlongationDepart?.trim() || "_______________";
            const safeLieuProRetour = lieuProlongationRetour?.trim() || "_______________";
            const safeFraisLivraison = fraisLivraison?.trim() || "_______________";

            const modeReg = modeReglement === "cheque" ? "Chèque" : (modeReglement === "especes" ? "Espèces" : "Autres");
            const safeObservations = observations?.trim() || "_________________________________________";

            // articles (21, raccourcis mais complets)
            const articles = [
                {titre:"ARTICLE 1 – OBJET DU CONTRAT", texte:"Le présent contrat a pour objet la location d’un véhicule par la société ABDERCAR, ci-après dénommée « le Loueur », au profit du client, ci-après dénommé « le Locataire ». La location est strictement personnelle, temporaire et non transmissible."},
                {titre:"ARTICLE 2 – FORMATION DU CONTRAT", texte:"Le contrat est formé dès signature par les parties et remise du véhicule. 👉 La signature vaut : acceptation sans réserve, reconnaissance de l’état du véhicule, engagement à respecter toutes les clauses."},
                {titre:"ARTICLE 3 – CONDUCTEURS AUTORISÉS", texte:`Seuls les conducteurs mentionnés au contrat sont autorisés à conduire le véhicule. Le locataire reste pleinement responsable, même si un tiers conduit. ❗ Toute conduite non autorisée entraîne : exclusion d’assurance, responsabilité totale du locataire. Conducteur principal : ${safeLoc} (permis ${safePermis}).`},
                {titre:"ARTICLE 4 – UTILISATION DU VÉHICULE", texte:"Le locataire s’engage à utiliser le véhicule conformément à sa destination. Il est strictement interdit : d’utiliser le véhicule à des fins illégales, de transporter des passagers à titre onéreux, de participer à des courses ou essais, de circuler hors routes carrossables, de sortir le véhicule du territoire marocain, de sous-louer ou céder le véhicule. 👉 En cas de violation : résiliation immédiate + poursuites possibles."},
                {titre:"ARTICLE 5 – ÉTAT DU VÉHICULE", texte:`Le véhicule est remis en bon état apparent et de fonctionnement. La fiche état + photos font foi juridiquement. 👉 Toute absence de réserve = acceptation définitive. Le locataire doit restituer le véhicule dans le même état (hors usure normale). Kilométrage départ : ${safeKm} km.`},
                {titre:"ARTICLE 6 – ENTRETIEN ET UTILISATION TECHNIQUE", texte:"Le locataire doit : vérifier huile, eau, pression pneus, utiliser carburant adapté, respecter les alertes du véhicule. 👉 Toute négligence engage sa responsabilité totale."},
                {titre:"ARTICLE 7 – DURÉE – PROLONGATION", texte:`La location est conclue pour une durée déterminée du ${safeDebut} au ${safeFin}. Toute prolongation nécessite accord écrit et doit être payée à l’avance. 👉 À défaut : abus de confiance (poursuites pénales possibles).`},
                {titre:"ARTICLE 8 – RESTITUTION DU VÉHICULE", texte:`Le véhicule doit être restitué à la date prévue (${safeFin}), au lieu convenu, avec le même niveau de carburant, dans le même état. 👉 Toute journée commencée est due. 👉 Tout retard = facturation + indemnité.`},
                {titre:"ARTICLE 9 – CLAUSE ESSENTIELLE (DROITS DU LOUEUR)", texte:"La restitution du véhicule ne constitue ni quitus, ni règlement, ni renonciation aux droits du Loueur. Le locataire reste redevable de : dommages constatés après restitution, franchise assurance, frais cachés ou différés, amendes reçues ultérieurement. 👉 ABDERCAR conserve un droit de poursuite TOTAL même après restitution."},
                {titre:"ARTICLE 10 – DÉPÔT DE GARANTIE", texte:`Un dépôt de garantie d’un montant de ${safeCaution} MAD est exigé. Il sert à couvrir : dommages, franchise, retards, frais divers. Le loueur peut : 👉 retenir partiellement ou totalement la caution, sans autorisation préalable du locataire.`},
                {titre:"ARTICLE 11 – ASSURANCE", texte:"Le véhicule est assuré conformément à la loi marocaine. ❗ Restent à la charge du locataire : franchise, dommages non couverts, faute grave. ❗ Exclusions : alcool / drogue, conducteur non autorisé, absence de permis, négligence."},
                {titre:"ARTICLE 12 – ACCIDENT / SINISTRE", texte:"Le locataire doit prévenir immédiatement le loueur, déclarer aux autorités, fournir constat. ❗ Interdiction : reconnaître sa responsabilité, négocier avec tiers."},
                {titre:"ARTICLE 13 – PANNES ET IMMOBILISATION", texte:"Panne normale → loueur. Mauvaise utilisation → locataire. 👉 Immobilisation imputable au locataire : facturation journalière complète."},
                {titre:"ARTICLE 14 – AMENDES ET INFRACTIONS", texte:"Le locataire est seul responsable de : amendes, PV, infractions. 👉 Le loueur peut : payer et refacturer, ou transmettre aux autorités."},
                {titre:"ARTICLE 15 – NETTOYAGE", texte:"Le véhicule doit être rendu propre. 👉 Nettoyage exceptionnel facturé."},
                {titre:"ARTICLE 16 – PREUVE", texte:"Font foi : contrat signé, fiche état, photos, messages (WhatsApp, email). Preuve électronique reconnue."},
                {titre:"ARTICLE 17 – DETTE ET RECOUVREMENT", texte:"Toute somme due est certaine, liquide et exigible. En cas de non-paiement : mise en demeure, pénalité 20 %, poursuites judiciaires."},
                {titre:"ARTICLE 18 – RÉSILIATION", texte:"Le loueur peut résilier immédiatement en cas de non-respect, danger ou fraude."},
