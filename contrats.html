<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>ABDERCAR - Contrats de location</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .card-actions { display: flex; gap: 0.5rem; margin-top: 1rem; flex-wrap: wrap; }
        .two-col-form { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
        @media (max-width: 768px) { .two-col-form { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
<div class="app-container">
    <div class="main-header">
        <div class="logo"><h1><i class="fas fa-car"></i> ABDERCAR</h1><p>Gestion de flotte</p></div>
        <div class="user-actions"><span id="userEmail"></span><button id="logoutBtn" class="btn-logout"><i class="fas fa-sign-out-alt"></i> Déconnexion</button></div>
    </div>
    <div class="main-nav">
        <a href="dashboard.html" class="nav-link">📊 Dashboard</a>
        <a href="vehicules.html" class="nav-link">🚗 Véhicules</a>
        <a href="contrats.html" class="nav-link active">📝 Contrats</a>
        <a href="depenses.html" class="nav-link">💰 Dépenses</a>
        <a href="credits.html" class="nav-link">🏦 Crédits</a>
        <a href="investisseurs.html" class="nav-link">👥 Investisseurs</a>
        <a href="ia.html" class="nav-link">🤖 IA</a>
        <a href="facturation.html" class="nav-link">📄 Facturation</a>
        <a href="parc-auto.html" class="nav-link">📋 Parc Auto</a>
    </div>
    <div class="content">
        <div style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px;">
            <h2>📝 Contrats de location</h2>
            <button id="openContratModalBtn" class="btn btn-primary"><i class="fas fa-plus"></i> Nouveau contrat</button>
        </div>
        <div id="contratsList" style="margin-top: 1rem;"></div>
        <div id="syncStatus" class="status">✅ Prêt</div>
    </div>
</div>

<!-- MODAL CONTRAT (avec deuxième conducteur) -->
<div id="contratModal" style="display: none; position: fixed; inset:0; background: rgba(0,0,0,0.5); align-items: center; justify-content: center; z-index: 1000; overflow-y: auto; padding: 20px;">
    <div style="background: white; max-width: 800px; width: 100%; border-radius: 20px; padding: 1.5rem; margin: auto;">
        <h3 class="mb-3">Nouveau contrat</h3>
        <div class="form-group"><label>Véhicule *</label><select id="contratVehiculeId" class="form-control"></select></div>
        
        <div class="form-group"><label>Type client</label><select id="clientType" class="form-control"><option value="particulier">Particulier</option><option value="societe">Société</option></select></div>
        
        <!-- Conducteur principal -->
        <div id="particulierFields">
            <h4>Conducteur principal</h4>
            <div class="two-col-form">
                <div><label>CIN *</label><input id="conducteurCin" class="form-control"></div>
                <div><label>Nom complet *</label><input id="conducteurNom" class="form-control"></div>
                <div><label>Téléphone</label><input id="conducteurTel" class="form-control"></div>
                <div><label>Email</label><input id="conducteurEmail" class="form-control"></div>
                <div><label>Adresse</label><input id="conducteurAdresse" class="form-control"></div>
                <div><label>Permis n°</label><input id="conducteurPermis" class="form-control"></div>
            </div>
        </div>
        <div id="societeFields" style="display:none;">
            <h4>Société (client moral)</h4>
            <div class="two-col-form">
                <div><label>Raison sociale *</label><input id="societeRaison" class="form-control"></div>
                <div><label>ICE *</label><input id="societeICE" class="form-control"></div>
                <div><label>IF *</label><input id="societeIF" class="form-control"></div>
                <div><label>RC *</label><input id="societeRC" class="form-control"></div>
                <div><label>Adresse *</label><input id="societeAdresse" class="form-control"></div>
                <div><label>Email *</label><input id="societeEmail" class="form-control"></div>
                <div><label>Téléphone *</label><input id="societeTel" class="form-control"></div>
                <div><label>Personne de contact</label><input id="societeContact" class="form-control"></div>
            </div>
        </div>
        
        <!-- Deuxième conducteur (optionnel) -->
        <div style="margin-top: 1rem;">
            <h4>Deuxième conducteur (optionnel)</h4>
            <div class="two-col-form" id="deuxiemeConducteurFields">
                <div><label>Nom complet</label><input id="deuxiemeNom" class="form-control"></div>
                <div><label>CIN</label><input id="deuxiemeCin" class="form-control"></div>
                <div><label>Téléphone</label><input id="deuxiemeTel" class="form-control"></div>
                <div><label>Permis n°</label><input id="deuxiemePermis" class="form-control"></div>
                <div><label>Adresse</label><input id="deuxiemeAdresse" class="form-control" colspan="2"></div>
            </div>
        </div>
        
        <!-- Détails location -->
        <h4>Période et tarifs</h4>
        <div class="two-col-form">
            <div><label>Date début *</label><input id="contratDebut" type="date" class="form-control"></div>
            <div><label>Date fin *</label><input id="contratFin" type="date" class="form-control"></div>
            <div><label>Montant total (DH) *</label><input id="contratMontant" type="number" class="form-control"></div>
            <div><label>Avance / Caution (DH)</label><input id="contratAvance" type="number" class="form-control" value="0"></div>
            <div><label>Lieu départ</label><input id="lieuDepart" class="form-control" value="Rabat"></div>
            <div><label>Lieu retour</label><input id="lieuRetour" class="form-control"></div>
            <div><label>Km départ</label><input id="kmDepart" type="number" class="form-control"></div>
            <div><label>Km retour (prévisionnel)</label><input id="kmRetour" type="number" class="form-control"></div>
            <div><label>Carburant départ</label><select id="niveauCarburant" class="form-control"><option>Plein</option><option>Réservé</option><option>Moitié</option></select></div>
            <div><label>État livraison</label><input id="etatLivraison" class="form-control" value="Très bon état"></div>
            <div><label>État retour</label><input id="etatRetour" class="form-control"></div>
        </div>
        
        <div style="display: flex; gap: 1rem; justify-content: flex-end; margin-top: 1rem;">
            <button id="closeContratModal" class="btn btn-secondary">Annuler</button>
            <button id="saveContrat" class="btn btn-primary">Enregistrer contrat</button>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import { getFirestore, collection, addDoc, getDocs, doc, updateDoc, deleteDoc, query, where, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDE3BJsD1mp-vz9TEJSo4WtFcHe8sw6jJI",
        authDomain: "gslv-c3875.firebaseapp.com",
        projectId: "gslv-c3875",
        storageBucket: "gslv-c3875.firebasestorage.app",
        messagingSenderId: "971384785471",
        appId: "1:971384785471:web:c881bc4db0595720ae068a"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    let currentUser = null;
    let vehiculesList = [];

    // MODAL LOGIC
    const modal = document.getElementById('contratModal');
    const openBtn = document.getElementById('openContratModalBtn');
    const closeBtn = document.getElementById('closeContratModal');
    const saveBtn = document.getElementById('saveContrat');
    const clientTypeSelect = document.getElementById('clientType');
    const particulierDiv = document.getElementById('particulierFields');
    const societeDiv = document.getElementById('societeFields');

    clientTypeSelect.addEventListener('change', () => {
        if (clientTypeSelect.value === 'societe') {
            particulierDiv.style.display = 'none';
            societeDiv.style.display = 'block';
        } else {
            particulierDiv.style.display = 'block';
            societeDiv.style.display = 'none';
        }
    });

    openBtn.onclick = () => {
        if (vehiculesList.length === 0) { alert("Ajoutez d'abord un véhicule."); return; }
        // Reset all fields (identique à avant)
        document.getElementById('contratVehiculeId').value = '';
        document.getElementById('conducteurCin').value = '';
        document.getElementById('conducteurNom').value = '';
        document.getElementById('conducteurTel').value = '';
        document.getElementById('conducteurEmail').value = '';
        document.getElementById('conducteurAdresse').value = '';
        document.getElementById('conducteurPermis').value = '';
        document.getElementById('societeRaison').value = '';
        document.getElementById('societeICE').value = '';
        document.getElementById('societeIF').value = '';
        document.getElementById('societeRC').value = '';
        document.getElementById('societeAdresse').value = '';
        document.getElementById('societeEmail').value = '';
        document.getElementById('societeTel').value = '';
        document.getElementById('societeContact').value = '';
        document.getElementById('deuxiemeNom').value = '';
        document.getElementById('deuxiemeCin').value = '';
        document.getElementById('deuxiemeTel').value = '';
        document.getElementById('deuxiemePermis').value = '';
        document.getElementById('deuxiemeAdresse').value = '';
        document.getElementById('contratDebut').value = '';
        document.getElementById('contratFin').value = '';
        document.getElementById('contratMontant').value = '';
        document.getElementById('contratAvance').value = '0';
        document.getElementById('lieuDepart').value = 'Rabat';
        document.getElementById('lieuRetour').value = '';
        document.getElementById('kmDepart').value = '';
        document.getElementById('kmRetour').value = '';
        document.getElementById('niveauCarburant').value = 'Plein';
        document.getElementById('etatLivraison').value = 'Très bon état';
        document.getElementById('etatRetour').value = '';
        clientTypeSelect.dispatchEvent(new Event('change'));
        modal.style.display = 'flex';
    };
    closeBtn.onclick = () => modal.style.display = 'none';
    window.onclick = (e) => { if (e.target === modal) modal.style.display = 'none'; };

    saveBtn.onclick = async () => {
        const vehiculeId = document.getElementById('contratVehiculeId').value;
        if (!vehiculeId) { alert("Sélectionnez un véhicule"); return; }
        const debut = document.getElementById('contratDebut').value;
        const fin = document.getElementById('contratFin').value;
        const montant = Number(document.getElementById('contratMontant').value);
        if (!debut || !fin || !montant) { alert("Dates et montant obligatoires"); return; }

        let clientInfo = {};
        if (clientTypeSelect.value === 'particulier') {
            const cin = document.getElementById('conducteurCin').value.trim();
            const nom = document.getElementById('conducteurNom').value.trim();
            if (!cin || !nom) { alert("CIN et nom du conducteur principal requis"); return; }
            clientInfo = {
                type: 'particulier',
                cin, nom,
                telephone: document.getElementById('conducteurTel').value,
                email: document.getElementById('conducteurEmail').value,
                adresse: document.getElementById('conducteurAdresse').value,
                permis: document.getElementById('conducteurPermis').value
            };
        } else {
            const raison = document.getElementById('societeRaison').value.trim();
            const ice = document.getElementById('societeICE').value.trim();
            const ifs = document.getElementById('societeIF').value.trim();
            const rc = document.getElementById('societeRC').value.trim();
            const adresse = document.getElementById('societeAdresse').value.trim();
            const email = document.getElementById('societeEmail').value.trim();
            const tel = document.getElementById('societeTel').value.trim();
            if (!raison || !ice || !ifs || !rc || !adresse || !email || !tel) { alert("Tous les champs société requis"); return; }
            clientInfo = {
                type: 'societe',
                raisonSociale: raison, ice, if: ifs, rc, adresse, email, telephone: tel,
                contact: document.getElementById('societeContact').value
            };
        }
        
        const deuxiemeNom = document.getElementById('deuxiemeNom').value.trim();
        const deuxiemeConducteur = deuxiemeNom ? {
            nom: deuxiemeNom,
            cin: document.getElementById('deuxiemeCin').value.trim(),
            telephone: document.getElementById('deuxiemeTel').value.trim(),
            permis: document.getElementById('deuxiemePermis').value.trim(),
            adresse: document.getElementById('deuxiemeAdresse').value.trim()
        } : null;

        const contratData = {
            vehiculeId,
            clientInfo,
            deuxiemeConducteur,
            debut: new Date(debut),
            fin: new Date(fin),
            montant,
            avance: Number(document.getElementById('contratAvance').value) || 0,
            lieuDepart: document.getElementById('lieuDepart').value,
            lieuRetour: document.getElementById('lieuRetour').value,
            kmDepart: Number(document.getElementById('kmDepart').value) || null,
            kmRetour: Number(document.getElementById('kmRetour').value) || null,
            niveauCarburant: document.getElementById('niveauCarburant').value,
            etatLivraison: document.getElementById('etatLivraison').value,
            etatRetour: document.getElementById('etatRetour').value,
            userId: currentUser.uid,
            createdAt: new Date(),
            updatedAt: new Date(),
            statut: "actif"
        };
        try {
            await addDoc(collection(db, "contrats"), contratData);
            alert("Contrat enregistré");
            modal.style.display = 'none';
            loadContrats();
        } catch (error) { alert("Erreur: "+error.message); }
    };

    async function loadVehicules() {
        const q = query(collection(db, "vehicules"), where("userId", "==", currentUser.uid));
        const snap = await getDocs(q);
        vehiculesList = snap.docs.map(d => ({ id: d.id, ...d.data() }));
        const select = document.getElementById('contratVehiculeId');
        select.innerHTML = '<option value="">Sélectionner</option>';
        vehiculesList.forEach(v => select.innerHTML += `<option value="${v.id}">${v.marque} ${v.modele} - ${v.immatriculation}</option>`);
    }

    async function loadContrats() {
        const q = query(collection(db, "contrats"), where("userId", "==", currentUser.uid));
        const snapshot = await getDocs(q);
        const container = document.getElementById('contratsList');
        container.innerHTML = '';
        if (snapshot.empty) { container.innerHTML = '<div class="card">Aucun contrat.</div>'; return; }
        for (const docSnap of snapshot.docs) {
            const c = docSnap.data();
            const vehDoc = await getDoc(doc(db, "vehicules", c.vehiculeId));
            const vehiculeNom = vehDoc.exists() ? `${vehDoc.data().marque} ${vehDoc.data().modele}` : "?";
            let clientDisplay = '';
            if (c.clientInfo.type === 'particulier') clientDisplay = `${c.clientInfo.nom} (${c.clientInfo.cin})`;
            else clientDisplay = `${c.clientInfo.raisonSociale} (ICE: ${c.clientInfo.ice})`;
            const debutDate = c.debut?.toDate ? c.debut.toDate() : new Date(c.debut);
            const finDate = c.fin?.toDate ? c.fin.toDate() : new Date(c.fin);
            container.innerHTML += `
                <div class="card" data-id="${docSnap.id}">
                    <div><strong>${vehiculeNom}</strong> - ${debutDate.toLocaleDateString()} → ${finDate.toLocaleDateString()}</div>
                    <div>Client : ${clientDisplay}</div>
                    <div>Montant : ${c.montant} DH | Avance : ${c.avance || 0} DH</div>
                    <div class="card-actions">
                        <button class="btn btn-primary btn-sm downloadPdf" data-id="${docSnap.id}"><i class="fas fa-file-pdf"></i> Télécharger PDF</button>
                        <button class="btn btn-danger btn-sm deleteContrat" data-id="${docSnap.id}"><i class="fas fa-trash"></i> Supprimer</button>
                    </div>
                </div>
            `;
        }
        document.querySelectorAll('.deleteContrat').forEach(btn => btn.onclick = async () => { if(confirm("Supprimer ?")) { await deleteDoc(doc(db, "contrats", btn.dataset.id)); loadContrats(); } });
        document.querySelectorAll('.downloadPdf').forEach(btn => btn.onclick = () => genererPDFContrat(btn.dataset.id));
    }

    // ========== GÉNÉRATION PDF SUR 2 PAGES ==========
    async function genererPDFContrat(contratId) {
        const contratDoc = await getDoc(doc(db, "contrats", contratId));
        if (!contratDoc.exists()) { alert("Contrat introuvable"); return; }
        const contrat = contratDoc.data();
        const vehiculeDoc = await getDoc(doc(db, "vehicules", contrat.vehiculeId));
        const vehicule = vehiculeDoc.exists() ? vehiculeDoc.data() : { marque: "", modele: "", immatriculation: "" };

        const client = contrat.clientInfo;
        const deuxieme = contrat.deuxiemeConducteur;
        const debut = contrat.debut.toDate();
        const fin = contrat.fin.toDate();
        const nbJours = Math.ceil((fin - debut) / (1000*60*60*24));
        const prixJournalier = (contrat.montant / nbJours).toFixed(2);
        const tva = contrat.montant * 0.2;
        const totalTTC = contrat.montant + tva;
        const caution = contrat.avance || 0;
        const kmDepart = contrat.kmDepart || "_____";
        
        let nom = "", cin = "", permis = "", telephone = "", adresse = "";
        if (client.type === 'particulier') {
            nom = client.nom;
            cin = client.cin;
            permis = client.permis || "_______________";
            telephone = client.telephone || "";
            adresse = client.adresse || "";
        } else {
            nom = client.raisonSociale;
            cin = client.ice || "_______________";
            permis = "_______________";
            telephone = client.telephone;
            adresse = client.adresse;
        }
        
        // Articles (conditions générales) - version complète mais concise pour tenir sur une page
        const articles = [
            "ARTICLE 1 – OBJET : Location d’un véhicule par ABDERCAR au client.",
            "ARTICLE 2 – FORMATION : Signature = acceptation sans réserve.",
            "ARTICLE 3 – CONDUCTEURS : Seuls les conducteurs autorisés. Conducteur principal : "+nom+" (permis "+permis+")"+(deuxieme ? ", 2ème conducteur : "+deuxieme.nom : ""),
            "ARTICLE 4 – UTILISATION : Interdiction formelle (usage illégal, sous-location, compétition, sortie du Maroc).",
            "ARTICLE 5 – ÉTAT : Véhicule remis en bon état. Kilométrage départ : "+kmDepart+" km.",
            "ARTICLE 6 – ENTRETIEN : Locataire responsable des vérifications (huile, eau, pneus).",
            "ARTICLE 7 – DURÉE : Du "+debut.toLocaleDateString()+" au "+fin.toLocaleDateString()+". Toute prolongation nécessite accord écrit.",
            "ARTICLE 8 – RESTITUTION : Retour à la date/heure prévue, avec même niveau carburant.",
            "ARTICLE 9 – CLAUSE ESSENTIELLE : ABDERCAR conserve ses droits après restitution.",
            "ARTICLE 10 – DÉPÔT DE GARANTIE : Caution de "+caution+" MAD, utilisable pour dommages, retards.",
            "ARTICLE 11 – ASSURANCE : Véhicule assuré. Franchise et exclusions à charge locataire.",
            "ARTICLE 12 – ACCIDENT : Déclaration immédiate. Interdiction de négocier avec tiers.",
            "ARTICLE 13 – PANNES : Panne normale → loueur ; mauvaise utilisation → locataire.",
            "ARTICLE 14 – AMENDES : À la charge du locataire.",
            "ARTICLE 15 – NETTOYAGE : Véhicule rendu propre, sinon facturation.",
            "ARTICLE 16 – PREUVE : Contrat, fiche état, photos, messages WhatsApp font foi.",
            "ARTICLE 17 – DETTE : Pénalité de 20% en cas de non-paiement.",
            "ARTICLE 18 – RÉSILIATION : En cas de non-respect, résiliation immédiate.",
            "ARTICLE 19 – FORCE MAJEURE : Non-responsabilité du loueur.",
            "ARTICLE 20 – JURIDICTION : Tribunaux de Rabat.",
            "ARTICLE 21 – ACCEPTATION : Signature vaut acceptation totale."
        ];
        const articlesHtml = `<div class="articles">${articles.map(a => `<p>${a}</p>`).join('')}</div>`;

        // Construction des deux pages
        const page1Html = `
            <div class="page recto">
                <div class="header">
                    <h1>ABDERCAR – LOCATION DE VÉHICULES</h1>
                    <p>N°291 Groupe Al Ahd, Hay Nahda 1, Rabat – Tél : 0619 81 13 13 / 0663 00 73 72</p>
                    <p>RC:111305 - IF:3374473 - CNSS:4496479 - PATENTE:25909585</p>
                </div>
                <div class="title">CONTRAT DE LOCATION N° ${contratId.slice(-8)}</div>
                
                <div class="section">
                    <h3>IDENTITÉ DU CLIENT</h3>
                    <div class="info-grid">
                        <div><strong>Nom / Raison sociale :</strong> ${nom}</div>
                        <div><strong>CIN / ICE :</strong> ${cin}</div>
                        <div><strong>Adresse :</strong> ${adresse}</div>
                        <div><strong>Téléphone :</strong> ${telephone}</div>
                        <div><strong>Permis n° :</strong> ${permis}</div>
                    </div>
                    ${deuxieme ? `
                    <h3 style="margin-top:1rem;">DEUXIÈME CONDUCTEUR</h3>
                    <div class="info-grid">
                        <div><strong>Nom :</strong> ${deuxieme.nom || ""}</div>
                        <div><strong>CIN :</strong> ${deuxieme.cin || ""}</div>
                        <div><strong>Téléphone :</strong> ${deuxieme.telephone || ""}</div>
                        <div><strong>Permis :</strong> ${deuxieme.permis || ""}</div>
                        <div><strong>Adresse :</strong> ${deuxieme.adresse || ""}</div>
                    </div>` : ''}
                </div>

                <div class="section">
                    <h3>VÉHICULE</h3>
                    <div class="info-grid">
                        <div><strong>Marque / Modèle :</strong> ${vehicule.marque} ${vehicule.modele}</div>
                        <div><strong>Immatriculation :</strong> ${vehicule.immatriculation}</div>
                        <div><strong>Carburant départ :</strong> ${contrat.niveauCarburant || "Plein"}</div>
                        <div><strong>État livraison :</strong> ${contrat.etatLivraison || "Très bon état"}</div>
                        <div><strong>Km départ :</strong> ${contrat.kmDepart || "---"}</div>
                    </div>
                </div>

                <div class="section">
                    <h3>DÉTAILS DE LA LOCATION</h3>
                    <table class="details-table">
                        <tr><td><strong>Date départ :</strong> ${debut.toLocaleDateString()}</td><td><strong>Date fin :</strong> ${fin.toLocaleDateString()}</td></tr>
                        <tr><td><strong>Lieu départ :</strong> ${contrat.lieuDepart || "Rabat"}</td><td><strong>Lieu retour :</strong> ${contrat.lieuRetour || "Rabat"}</td></tr>
                        <tr><td><strong>Nombre de jours :</strong> ${nbJours}</td><td><strong>Prix journalier (HT) :</strong> ${prixJournalier} DH</td></tr>
                        <tr><td><strong>Montant HT :</strong> ${contrat.montant.toFixed(2)} DH</td><td><strong>TVA 20% :</strong> ${tva.toFixed(2)} DH</td></tr>
                        <tr><td><strong>Total TTC :</strong> <strong>${totalTTC.toFixed(2)} DH</strong></td><td><strong>Avance / Caution :</strong> ${caution} DH</td></tr>
                        <tr><td colspan="2"><strong>Reste à payer :</strong> ${(totalTTC - caution).toFixed(2)} DH</td></tr>
                    </table>
                </div>

                <div class="signatures">
                    <div>Signature du Locataire : <span class="sign-line">_________________________</span></div>
                    <div>Signature du Loueur (ABDERCAR) : <span class="sign-line">_________________________</span></div>
                </div>
                <div class="footer">Fait à Rabat, le ${new Date().toLocaleDateString()}</div>
            </div>
        `;

        const page2Html = `
            <div class="page verso" style="page-break-before: always;">
                <div class="header">
                    <h2>CONDITIONS GÉNÉRALES DE LOCATION</h2>
                </div>
                <div class="articles-columns">
                    ${articlesHtml}
                </div>
