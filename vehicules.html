<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ABDERCAR - Véhicules</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
<div class="app-container">
    <div class="main-header"><div class="logo"><h1><i class="fas fa-car"></i> ABDERCAR</h1><p>Gestion de flotte</p></div><div class="user-actions"><span id="userEmail"></span><button id="logoutBtn" class="btn-logout"><i class="fas fa-sign-out-alt"></i> Déconnexion</button></div></div>
    <div class="main-nav">
        <a href="dashboard.html" class="nav-link">📊 Dashboard</a><a href="vehicules.html" class="nav-link active">🚗 Véhicules</a><a href="contrats.html" class="nav-link">📝 Contrats</a><a href="depenses.html" class="nav-link">💰 Dépenses</a><a href="credits.html" class="nav-link">🏦 Crédits</a><a href="investisseurs.html" class="nav-link">👥 Investisseurs</a><a href="ia.html" class="nav-link">🤖 IA</a><a href="facturation.html" class="nav-link">📄 Facturation</a><a href="parc-auto.html" class="nav-link">📋 Parc Auto</a>
    </div>
    <div class="content">
        <div style="display:flex; justify-content:space-between; align-items:center;"><h2>🚘 Mes véhicules</h2><button id="openAddModal" class="btn btn-primary"><i class="fas fa-plus"></i> Ajouter</button></div>
        <div id="vehiculesList" class="grid-2" style="margin-top:1.5rem;"></div>
    </div>
</div>
<div id="vehicleModal" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.5); align-items:center; justify-content:center; z-index:1000;"><div style="background:white; max-width:500px; width:90%; border-radius:20px; padding:1.5rem;"><h3 id="modalTitle">Ajouter un véhicule</h3><input type="hidden" id="vehicleId"><div class="form-group"><label>Marque</label><input id="marque" class="form-control"></div><div class="form-group"><label>Modèle</label><input id="modele" class="form-control"></div><div class="form-group"><label>Immatriculation</label><input id="immatriculation" class="form-control"></div><div class="form-group"><label>Date mise en circulation</label><input id="dateCirculation" type="date" class="form-control"></div><div class="form-group"><label>Prix d'achat (DH)</label><input id="prixAchat" type="number" class="form-control" value="0"></div><div class="form-group"><label>Carburant</label><select id="carburant" class="form-control"><option value="Diesel">Diesel</option><option value="Essence">Essence</option><option value="Hybride">Hybride</option><option value="Électrique">Électrique</option></select></div><div style="display:flex; gap:1rem; justify-content:flex-end;"><button id="closeModal" class="btn btn-secondary">Annuler</button><button id="saveVehicle" class="btn btn-primary">Enregistrer</button></div></div></div>
<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import { getFirestore, collection, addDoc, getDocs, doc, updateDoc, deleteDoc, query, where } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
    const firebaseConfig = { apiKey: "AIzaSyDE3BJsD1mp-vz9TEJSo4WtFcHe8sw6jJI", authDomain: "gslv-c3875.firebaseapp.com", projectId: "gslv-c3875", storageBucket: "gslv-c3875.firebasestorage.app", messagingSenderId: "971384785471", appId: "1:971384785471:web:c881bc4db0595720ae068a" };
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    let currentUser = null;
    let vehiculesList = [];
    onAuthStateChanged(auth, (user) => { if (!user) window.location.href = "index.html"; else { currentUser = user; document.getElementById('userEmail').innerText = user.email; loadVehicules(); } });
    document.getElementById('logoutBtn').onclick = () => signOut(auth);
    async function loadVehicules() { const q = query(collection(db, "vehicules"), where("userId", "==", currentUser.uid)); const snapshot = await getDocs(q); vehiculesList = snapshot.docs.map(d => ({ id: d.id, ...d.data() })); const container = document.getElementById('vehiculesList'); container.innerHTML = ''; vehiculesList.forEach(v => container.appendChild(createCard(v.id, v))); if (vehiculesList.length === 0) container.innerHTML = '<div class="card">Aucun véhicule. Cliquez sur "Ajouter".</div>'; }
    function createCard(id, v) { const div = document.createElement('div'); div.className = "card"; div.innerHTML = `<div><h3>${v.marque} ${v.modele}</h3><p>${v.immatriculation}</p><p>💰 ${v.prixAchat} DH</p><p>⛽ ${v.carburant || 'Diesel'}</p><p>📅 ${v.dateCirculation || ''}</p></div><div style="display:flex; gap:0.5rem; margin-top:1rem;"><button class="editBtn btn btn-secondary" data-id="${id}"><i class="fas fa-edit"></i> Modifier</button><button class="deleteBtn btn btn-danger" data-id="${id}"><i class="fas fa-trash"></i> Supprimer</button></div>`; div.querySelector('.editBtn').onclick = () => openModal(id, v); div.querySelector('.deleteBtn').onclick = () => deleteVehicle(id); return div; }
    async function deleteVehicle(id) { if(confirm("Supprimer ?")) { await deleteDoc(doc(db, "vehicules", id)); loadVehicules(); } }
    function openModal(id=null, data=null) { document.getElementById('vehicleId').value = id || ''; document.getElementById('marque').value = data?.marque || ''; document.getElementById('modele').value = data?.modele || ''; document.getElementById('immatriculation').value = data?.immatriculation || ''; document.getElementById('dateCirculation').value = data?.dateCirculation || ''; document.getElementById('prixAchat').value = data?.prixAchat || 0; document.getElementById('carburant').value = data?.carburant || 'Diesel'; document.getElementById('modalTitle').innerText = id ? 'Modifier véhicule' : 'Ajouter véhicule'; document.getElementById('vehicleModal').style.display = 'flex'; }
    document.getElementById('openAddModal').onclick = () => openModal();
    document.getElementById('closeModal').onclick = () => document.getElementById('vehicleModal').style.display = 'none';
    document.getElementById('saveVehicle').onclick = async () => { const id = document.getElementById('vehicleId').value; const data = { marque: document.getElementById('marque').value, modele: document.getElementById('modele').value, immatriculation: document.getElementById('immatriculation').value, dateCirculation: document.getElementById('dateCirculation').value, prixAchat: Number(document.getElementById('prixAchat').value), carburant: document.getElementById('carburant').value, userId: currentUser.uid, updatedAt: new Date() }; if (id) await updateDoc(doc(db, "vehicules", id), data); else await addDoc(collection(db, "vehicules"), { ...data, createdAt: new Date() }); document.getElementById('vehicleModal').style.display = 'none'; loadVehicules(); };
</script>
</body>
</html>
