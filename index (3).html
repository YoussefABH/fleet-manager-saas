<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ABDERCAR - Connexion</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
<div class="app-container" style="max-width: 500px; margin: 50px auto;">
    <div class="main-header" style="justify-content: center;">
        <div class="logo"><h1><i class="fas fa-car"></i> ABDERCAR</h1><p>Gestion de flotte</p></div>
    </div>
    <div class="card" style="margin: 2rem;">
        <div id="auth-container">
            <div class="form-group"><label>Email</label><input type="email" id="email" class="form-control" placeholder="exemple@email.com"></div>
            <div class="form-group"><label>Mot de passe</label><input type="password" id="password" class="form-control" placeholder="••••••"></div>
            <button id="loginBtn" class="btn btn-primary" style="width:100%; margin-bottom:0.75rem;"><i class="fas fa-sign-in-alt"></i> Se connecter</button>
            <button id="registerBtn" class="btn btn-secondary" style="width:100%;"><i class="fas fa-user-plus"></i> Créer un compte</button>
            <div id="message" class="mt-3 text-center" style="color: var(--accent);"></div>
        </div>
    </div>
</div>
<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    const firebaseConfig = {
        apiKey: "AIzaSyDE3BJsD1mp-vz9TEJSo4WtFcHe8sw6jJI",
        authDomain: "gslv-c3875.firebaseapp.com",
        projectId: "gslv-c3875",
        storageBucket: "gslv-c3875.firebasestorage.app",
        messagingSenderId: "971384785471",
        appId: "1:971384785471:web:c881bc4db0595720ae068a"
    };
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const emailInput = document.getElementById('email');
    const passInput = document.getElementById('password');
    const msgDiv = document.getElementById('message');
    document.getElementById('loginBtn').onclick = async () => {
        try { await signInWithEmailAndPassword(auth, emailInput.value, passInput.value); window.location.href = "dashboard.html"; }
        catch (err) { msgDiv.innerText = err.message; }
    };
    document.getElementById('registerBtn').onclick = async () => {
        try { await createUserWithEmailAndPassword(auth, emailInput.value, passInput.value); msgDiv.innerText = "Compte créé ! Connectez-vous."; msgDiv.style.color = "green"; }
        catch (err) { msgDiv.innerText = err.message; }
    };
</script>
</body>
</html>
